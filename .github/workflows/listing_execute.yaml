name: "Execute Listing"

env:
  GITHUB_USERNAME: ${{ github.actor }}
  GITHUB_EMAIL: "${{ github.actor }}@users.noreply.github.com"

on:
  workflow_dispatch:
    inputs:
      listing:
        type: string
        description: 'Listing number (e.g. 2.1)'
        required: true

jobs:
  execute-listing:
    name: "Executing listing ${{ github.event.inputs.listing }}"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5   # Latest stable as of 2026
        with:
          go-version: "1.24"        # Current stable (update as needed)
          cache: true               # Built-in caching (replaces manual cache)

      - name: Install Protoc Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Run
        run: |
          dir=$(find . -name "listing_${{ github.event.inputs.listing }}" -type d | head -n 1)
          if [ -z "$dir" ]; then
            echo "Error: Directory for listing_${{ github.event.inputs.listing }} not found"
            exit 1
          fi
          cd "$dir"
          ./run.sh "${{ env.GITHUB_USERNAME }}" "${{ env.GITHUB_EMAIL }}"
